# Deploy na GitHub Pages preko grane gh-pages (klasični način).
# Zaobilazi actions/deploy-pages koji vraća 404 dok Pages nije uključen na "GitHub Actions".
#
# U GitHubu: Settings → Pages → Build and deployment → Source: Deploy from a branch
# Branch: gh-pages  ·  Folder: / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build (repo-aware GitHub Pages base)
        env:
          GH_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build:gh-pages

      - name: SPA fallback za GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Push dist na granu gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
